name = "wuemail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"			#d1数据库绑定名默认不可修改
database_name = "wuemail"		#d1数据库名字
database_id = "157882ad-3bba-4a66-8bd9-db20bac14894"		#d1数据库id

[[kv_namespaces]]
binding = "kv"			#kv绑定名默认不可修改
id = "ab44570cd4d44929bfc0ef771cb1d5a5"					#kv数据库id

[[r2_buckets]]
binding = "r2"			#r2对象存储绑定名默认不可修改
bucket_name = "wuemail"		#r2对象存储桶的名字

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#定时任务每天晚上12点执行


[vars]
#orm_log = false
domain = ["wuename.com"]				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
admin = "admin@wuename.com"				#管理员的邮箱	示例: admin@example.com
jwt_secret = "wFNCr7SqBweumtosxpSKhtBKyB97HGjb"			#jwt令牌的密钥,随便填一串字符串

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
